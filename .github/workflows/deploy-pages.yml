name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          # Match local toolchain (npm 11). Node 22 ships npm 10, which rejects
          # lockfiles generated by npm 11 for optional @emnapi peers.
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Dist size budget
        run: |
          node -e "
          const { execSync } = require('node:child_process');
          const out = execSync('du -sb dist', { encoding: 'utf8' });
          const bytes = Number(out.split(/\s+/)[0]);
          const mb = bytes / (1024 * 1024);
          console.log('dist size:', mb.toFixed(1), 'MB');
          if (mb > 25) {
            console.error('dist exceeds 25MB budget');
            process.exit(1);
          }
          "

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Preview smoke
        run: npm run smoke

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
